<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yeni Admin Ekle</title>
    <link rel="stylesheet" href="style.css" />
    <script src="./config.js" defer></script>
    <script src="./newadmin.js" defer></script>
  </head>
  <body>
    <div class="wrapper">
      <div class="admin-container">
        <label for="txtName">User Name:</label>
        <input id="txtName" type="text" />
        <label for="txtPassword">User Password:</label>
        <input id="txtPassword" type="password" />
        <label for="cmbRole">User Role:</label>
        <div class="select-wrapper">
          <select id="cmbRole" name="cmbRole" class="admin-select">
            <option value="" disabled selected>Rol Seçiniz...</option>
            <option value="user">Standart Kullanıcı</option>
            <option value="editor">Editör</option>
            <option value="admin">Yönetici (Admin)</option>
          </select>
        </div>
        <button id="btnKaydet">Kaydet</button>
      </div>
    </div>
  </body>
</html>
